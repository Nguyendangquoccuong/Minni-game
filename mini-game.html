<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Siêu Chiến Dịch Xe Tăng - Sửa Lỗi Hiển Thị</title>
<style>
    html, body {
        margin: 0; padding: 0; background-color: #080810; color: white;
        font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; text-align: center; user-select: none;
        touch-action: none; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    .minigame-container {
        position: relative; width: 100vw; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center;
    }
    .info-bar { 
        position: absolute; top: 0; left: 0; width: 100%;
        padding: 12px 0; font-size: 15px; font-weight: bold; 
        background: linear-gradient(to bottom, rgba(0,0,0,0.95), rgba(0,0,0,0)); 
        z-index: 10; display: flex; justify-content: space-around; box-sizing: border-box;
    }
    #gameCanvas { background-color: #0b0c16; display: block; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
    
    .guide-overlay {
        position: absolute; bottom: 75px; left: 0; width: 100%;
        font-size: 11px; color: rgba(255,255,255,0.4); z-index: 9; pointer-events: none;
        letter-spacing: 0.5px; line-height: 1.5; text-shadow: 1px 1px 2px #000;
    }
    .btn-back {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        padding: 10px 24px; background-color: #ff5722; color: white;
        text-decoration: none; border-radius: 20px; font-size: 14px; font-weight: bold; z-index: 10;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
</style>
</head>
<body>

<div class="minigame-container">
    <div class="info-bar">
        <div>Màn: <span id="level" style="color: #00e676;">1</span></div>
        <div>Điểm: <span id="score" style="color: #ffea00;">0</span>/<span id="targetScore">100</span></div>
        <div>Mạng: <span id="hp">❤️❤️❤️❤️❤️</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="guide-overlay">
        Chạm NỬA TRÊN để BẮN<br>
        Giữ NỬA DƯỚI TRÁI / PHẢI để DI CHUYỂN
    </div>
    <a href="index.html" class="btn-back">← Về trang chủ</a>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const targetScoreEl = document.getElementById("targetScore");
const levelEl = document.getElementById("level");
const hpEl = document.getElementById("hp");

// ĐỊNH NGHĨA KHUNG HÌNH ẢO (VIRTUAL RESOLUTION) CỐ ĐỊNH CHỐNG TRÀN MÀN HÌNH
const V_WIDTH = 400;
const V_HEIGHT = 700;
let scale = 1;

function resizeCanvas() {
    // Tính toán tỷ lệ co giãn tối ưu để game luôn nằm trong màn hình thiết bị
    scale = Math.min(window.innerWidth / V_WIDTH, window.innerHeight / V_HEIGHT);
    canvas.width = V_WIDTH * scale;
    canvas.height = V_HEIGHT * scale;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// HỆ THỐNG ÂM THANH AN TOÀN
let audioCtx = null;
let musicInterval = null;

function playSound(type) {
    if (!audioCtx) return;
    try {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);

        if (type === 'shoot') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'explosion') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(10, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'item') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(350, audioCtx.currentTime);
            osc.frequency.setValueAtTime(700, audioCtx.currentTime + 0.07);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.18);
            osc.start(); osc.stop(audioCtx.currentTime + 0.18);
        }
    } catch(e) {}
}

function startBackgroundMusic() {
    if (musicInterval) clearInterval(musicInterval);
    musicInterval = setInterval(() => {
        if (!audioCtx || gameOver || levelUpgraded) return;
        try {
            let notes = [130.81, 146.83, 164.81, 196.00];
            let note = notes[Math.floor(Math.random() * notes.length)];
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(note, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.012, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        } catch(e) {}
    }, 380);
}

// KHỞI TẠO BIẾN DỰA TRÊN TỌA ĐỘ ẢO BIỂU DIỄN
let score = 0; let level = 1; let targetScore = 100; let hp = 5; 
let gameOver = false; let levelUpgraded = false;

const player = {
    x: V_WIDTH / 2 - 15, 
    y: V_HEIGHT - 130, // Vị trí an toàn tuyệt đối luôn hiển thị trên màn hình
    width: 30, height: 30, color: "#00E676", speed: 5.5,
    weaponLevel: 1, powerupTimer: 0, maxPowerupTime: 420
};

let bullets = []; let enemyBullets = []; let enemies = []; let items = []; let particles = [];      
let enemyBaseSpeed = 0.6; let enemyBulletSpeed = 1.1; let spawnTimer = 0;
let moveLeft = false; let moveRight = false; const activeTouches = {};

// SỰ KIỆN CẢM ỨNG ĐƯỢC CHUYỂN ĐỔI TỶ LỆ THEO KHUNG CHUẨN
window.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    
    if (!audioCtx) {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startBackgroundMusic();
        } catch(err) {}
    }

    // Quy đổi tọa độ click thực tế sang tọa độ ảo trong game
    let rect = canvas.getBoundingClientRect();
    let touchX = (e.clientX - rect.left) / scale;
    let touchY = (e.clientY - rect.top) / scale;

    activeTouches[e.pointerId] = { x: touchX, y: touchY };
    checkControls();
    
    // Sử dụng tỷ lệ tọa độ ảo 65% chiều cao khung chơi để chia vùng bắn
    if (touchY < V_HEIGHT * 0.65 && touchY >= 0 && touchX >= 0 && touchX <= V_WIDTH) {
        if (gameOver) { resetGame(); return; }
        if (levelUpgraded) { nextLevel(); return; }
        fireBullet();
    }
});

window.addEventListener("pointermove", (e) => {
    e.preventDefault();
    if (activeTouches[e.pointerId]) {
        let rect = canvas.getBoundingClientRect();
        activeTouches[e.pointerId] = { 
            x: (e.clientX - rect.left) / scale, 
            y: (e.clientY - rect.top) / scale 
        };
        checkControls();
    }
});

const endTouch = (e) => { 
    e.preventDefault(); 
    delete activeTouches[e.pointerId]; 
    checkControls(); 
};
window.addEventListener("pointerup", endTouch);
window.addEventListener("pointercancel", endTouch);

function checkControls() {
    moveLeft = false; moveRight = false;
    for (let id in activeTouches) {
        let touch = activeTouches[id];
        if (touch.y >= V_HEIGHT * 0.65) {
            if (touch.x < V_WIDTH / 2) moveLeft = true;
            else moveRight = true;
        }
    }
}

function fireBullet() {
    let centerX = player.x + player.width/2;
    if (player.weaponLevel === 1) {
        bullets.push({ x: centerX - 2.5, y: player.y - 8, width: 5, height: 15, color: "#FFEA00", vx: 0, vy: -12 });
    } else if (player.weaponLevel === 2) {
        bullets.push({ x: centerX - 2.5, y: player.y - 8, width: 5, height: 15, color: "#00E5FF", vx: 0, vy: -12 });
        bullets.push({ x: player.x, y: player.y, width: 5, height: 14, color: "#00E5FF", vx: -1.5, vy: -11 });
        bullets.push({ x: player.x + player.width - 5, y: player.y, width: 5, height: 14, color: "#00E5FF", vx: 1.5, vy: -11 });
    } else { 
        bullets.push({ x: centerX - 2.5, y: player.y - 8, width: 5, height: 15, color: "#FF1744", vx: 0, vy: -13 });
        bullets.push({ x: player.x, y: player.y, width: 5, height: 14, color: "#FF3D00", vx: -2, vy: -12 });
        bullets.push({ x: player.x + player.width - 5, y: player.y, width: 5, height: 14, color: "#FF3D00", vx: 2, vy: -12 });
        bullets.push({ x: player.x - 5, y: player.y + 5, width: 5, height: 12, color: "#FF9100", vx: -3.5, vy: -10 });
        bullets.push({ x: player.x + player.width, y: player.y + 5, width: 5, height: 12, color: "#FF9100", vx: 3.5, vy: -10 });
    }
    playSound('shoot');
}

function drawTank(x, y, width, height, baseColor, isEnemy = false, type = 'normal') {
    ctx.save();
    ctx.fillStyle = "#222224";
    ctx.fillRect(x - 3, y + 2, 4, height - 4);
    ctx.fillRect(x + width - 1, y + 2, 4, height - 4);
    ctx.fillStyle = baseColor; ctx.fillRect(x, y, width, height);
    if (type === 'heavy') { ctx.fillStyle = "#333"; ctx.fillRect(x + 4, y + 3, width - 8, 3); }
    ctx.fillStyle = isEnemy ? "#111116" : "#005028";
    ctx.beginPath(); ctx.arc(x + width/2, y + height/2, width/3.8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#ffffff";
    if (isEnemy) ctx.fillRect(x + width/2 - 2.5, y + height, 5, 9);
    else ctx.fillRect(x + width/2 - 2.5, y - 9, 5, 9);
    ctx.restore();
}
