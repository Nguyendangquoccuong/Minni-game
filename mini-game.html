<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Siêu Chiến Dịch Xe Tăng - Sửa Lỗi Hiển Thị</title>
<style>
    body {
        margin: 0; padding: 0; background-color: #080810; color: white;
        font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; text-align: center; user-select: none;
        touch-action: none;
    }
    .info { 
        position: absolute; top: 0; left: 0; width: 100%;
        padding: 15px 0; font-size: 16px; font-weight: bold; 
        background: linear-gradient(to bottom, rgba(0,0,0,0.85), rgba(0,0,0,0)); 
        z-index: 10; display: flex; justify-content: space-around; box-sizing: border-box;
    }
    #gameCanvas { background-color: #0b0c16; display: block; }
    
    .btn-back {
        position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
        padding: 8px 22px; background-color: rgba(255, 87, 34, 0.85);
        color: white; text-decoration: none; border-radius: 20px; font-size: 13px; font-weight: bold;
        z-index: 10; border: 1px solid #ff7043; backdrop-filter: blur(4px);
    }
    .guide-text {
        position: absolute; bottom: 55px; left: 0; width: 100%;
        font-size: 11px; color: rgba(255,255,255,0.4); z-index: 9; pointer-events: none;
        letter-spacing: 0.5px;
    }
</style>
</head>
<body>

<div class="info">
    <div>Màn: <span id="level" style="color: #00e676;">1</span></div>
    <div>Điểm: <span id="score" style="color: #ffea00;">0</span>/<span id="targetScore">100</span></div>
    <div>Mạng: <span id="hp">❤️❤️❤️❤️❤️</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<div class="guide-text">Chạm NỬA TRÊN để BẮN | Giữ NỬA DƯỚI TRÁI/PHẢI để DI CHUYỂN</div>
<a href="index.html" class="btn-back">⬅ Về trang chủ</a>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const targetScoreEl = document.getElementById("targetScore");
const levelEl = document.getElementById("level");
const hpEl = document.getElementById("hp");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// HỆ THỐNG ÂM THANH AN TOÀN - CHỐNG CRASH VÀ CHẶN ĐỒ HỌA
let audioCtx = null;
let musicInterval = null;

function initAudio() {
    if (audioCtx) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        startBackgroundMusic();
    } catch(e) {
        console.log("Trình duyệt chặn âm thanh tự động:", e);
    }
}

function playSound(type) {
    if (!audioCtx || audioCtx.state === 'suspended') return;
    try {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'shoot') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'explosion') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(10, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'item') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(350, audioCtx.currentTime);
            osc.frequency.setValueAtTime(700, audioCtx.currentTime + 0.07);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.18);
            osc.start(); osc.stop(audioCtx.currentTime + 0.18);
        }
    } catch(e) {}
}

function startBackgroundMusic() {
    if (musicInterval) clearInterval(musicInterval);
    musicInterval = setInterval(() => {
        if (!audioCtx || audioCtx.state === 'suspended' || gameOver || levelUpgraded || gameStartScreen) return;
        try {
            let notes = [130.81, 146.83, 164.81, 196.00];
            let note = notes[Math.floor(Math.random() * notes.length)];
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(note, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        } catch(e) {}
    }, 320);
}

// KHỞI TẠO BIẾN TRÒ CHƠI (Bản đồ rộng, xe nhỏ 30x30)
let score = 0;
let level = 1;
let targetScore = 100; 
let hp = 5; 
let gameOver = false;
let levelUpgraded = false; 
let gameStartScreen = true; // Trạng thái chờ người chơi bấm khởi động

const player = {
    x: canvas.width / 2 - 15,
    y: canvas.height - 110,
    width: 30,
    height: 30,
    color: "#00E676",
    speed: 6,
    weaponLevel: 1, 
    powerupTimer: 0,
    maxPowerupTime: 420
};

let bullets = [];        
let enemyBullets = [];   
let enemies = [];        
let items = [];          
let particles = [];      

let enemyBaseSpeed = 0.6; 
let enemyBulletSpeed = 1.2; 
let spawnTimer = 0;
let moveLeft = false;
let moveRight = false;
const activeTouches = {};

// SỰ KIỆN CẢM ỨNG ĐA ĐIỂM
window.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    initAudio(); // Kích hoạt âm thanh ngay khi chạm lần đầu
    
    if (gameStartScreen) {
        gameStartScreen = false;
        return;
    }

    activeTouches[e.pointerId] = { x: e.clientX, y: e.clientY };
    checkControls();
    
    if (e.clientY < canvas.height * 0.65) {
        if (gameOver) { resetGame(); return; }
        if (levelUpgraded) { nextLevel(); return; }
        fireBullet();
    }
});

window.addEventListener("pointermove", (e) => {
    e.preventDefault();
    if (activeTouches[e.pointerId]) {
        activeTouches[e.pointerId] = { x: e.clientX, y: e.clientY };
        checkControls();
    }
});

const endTouch = (e) => { 
    e.preventDefault(); 
    delete activeTouches[e.pointerId]; 
    checkControls(); 
};
window.addEventListener("pointerup", endTouch);
window.addEventListener("pointercancel", endTouch);

function checkControls() {
    moveLeft = false; moveRight = false;
    for (let id in activeTouches) {
        let touch = activeTouches[id];
        if (touch.y >= canvas.height * 0.65) {
            if (touch.x < canvas.width / 2) moveLeft = true;
            else moveRight = true;
        }
    }
}

function fireBullet() {
    playSound('shoot');
    let centerX = player.x + player.width/2;
    
    if (player.weaponLevel === 1) {
        bullets.push({ x: centerX - 2.5, y: player.y - 8, width: 5, height: 16, color: "#FFEA00", vx: 0, vy: -12 });
    } else if (player.weaponLevel === 2) {
        bullets.push({ x: centerX - 2.5, y: player.y - 8, width: 5, height: 16, color: "#00E5FF", vx: 0, vy: -12 });
        bullets.push({ x: player.x, y: player.y, width: 5, height: 15, color: "#00E5FF", vx: -1.5, vy: -11 });
        bullets.push({ x: player.x + player.width - 5, y: player.y, width: 5, height: 15, color: "#00E5FF", vx: 1.5, vy: -11 });
    } else { 
        bullets.push({ x: centerX - 2.5, y: player.y - 8, width: 5, height: 16, color: "#FF1744", vx: 0, vy: -13 });
        bullets.push({ x: player.x, y: player.y, width: 5, height: 15, color: "#FF3D00", vx: -2, vy: -12 });
        bullets.push({ x: player.x + player.width - 5, y: player.y, width: 5, height: 15, color: "#FF3D00", vx: 2, vy: -12 });
        bullets.push({ x: player.x - 5, y: player.y + 5, width: 5, height: 13, color: "#FF9100", vx: -3.8, vy: -10 });
        bullets.push({ x: player.x + player.width, y: player.y + 5, width: 5, height: 13, color: "#FF9100", vx: 3.8, vy: -10 });
    }
}

function drawTank(x, y, width, height, baseColor, isEnemy = false, type = 'normal') {
    ctx.save();
    ctx.fillStyle = "#222224";
    ctx.fillRect(x - 3, y + 2, 4, height - 4);
    ctx.fillRect(x + width - 1, y + 2, 4, height - 4);
    
    ctx.fillStyle = baseColor;
    ctx.fillRect(x, y, width, height);
    
    if (type === 'heavy') {
        ctx.fillStyle = "#333";
        ctx.fillRect(x + 4, y + 3, width - 8, 3);
    }

    ctx.fillStyle = isEnemy ? "#111116" : "#005028";
    ctx.beginPath(); ctx.arc(x + width/2, y + height/2, width/3.8, 0, Math.PI * 2); ctx.fill();
    
    ctx.fillStyle = "#ffffff";
    if (isEnemy) ctx.fillRect(x + width/2 - 2.5, y + height, 5, 10);
    else ctx.fillRect(x + width/2 - 2.5, y - 10, 5, 10);
    ctx.restore();
}

function createExplosion(x, y, color = "#FF9100") {
    playSound('explosion');
    for (let i = 0; i < 10; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5,
            radius: Math.random() * 2.5 + 1.5,
            color: color,
            alpha: 1
        });
    }
}

function updateHPDisplay() {
    let hearts = "";
    for (let i = 0; i < hp; i++) hearts += "❤️";
    hpEl.innerText = hearts || "💀";
}

function resetGame() {
    score = 0; level = 1; targetScore = 100; hp = 5;
    scoreEl.innerText = score; targetScoreEl.innerText = targetScore; levelEl.innerText = level;
    updateHPDisplay();
    player.weaponLevel = 1; player.powerupTimer = 0;
