<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mini Game Xe Tăng Pro</title>
<style>
    body {
        margin: 0; padding: 0; background-color: #1a1a1a; color: white;
        font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; text-align: center; user-select: none;
    }
    .info { padding: 12px; font-size: 22px; font-weight: bold; background: #111; border-bottom: 2px solid #444; }
    #gameCanvas { background-color: #252525; display: block; margin: 0 auto; }
    
    /* Giao diện nút bấm điều khiển trên điện thoại */
    .controls {
        display: flex; justify-content: space-around; align-items: center;
        padding: 15px 10px; background: #111; height: 80px; box-sizing: border-box;
    }
    .btn-ctrl {
        width: 35%; height: 55px; background-color: #333; border: 2px solid #666;
        color: white; font-size: 24px; font-weight: bold; border-radius: 12px;
        active { background-color: #555; }
    }
    .btn-back {
        display: inline-block; padding: 10px 20px; background-color: #ff5722;
        color: white; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 5px;
    }
</style>
</head>
<body>

<div class="info">Điểm: <span id="score">0</span> | Cấp độ: <span id="level">1</span></div>
<canvas id="gameCanvas"></canvas>

<!-- Bộ nút điều khiển di chuyển trái phải -->
<div class="controls">
    <button class="btn-ctrl" id="btnLeft">◀ TRÁI</button>
    <button class="btn-ctrl" id="btnRight">PHẢI ▶</button>
</div>

<div style="padding: 5px; font-size: 13px; color: #888;">Chạm vùng trống phía trên để BẮN ĐẠN!</div>
<a href="index.html" class="btn-back">⬅ Về trang chủ</a>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const levelEl = document.getElementById("level");

// Cấu hình kích thước chuẩn điện thoại
canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 190;

let score = 0;
let level = 1;
let gameOver = false;

// Xe tăng có thể di chuyển trục X
const player = {
    x: canvas.width / 2 - 20,
    y: canvas.height - 60,
    width: 40,
    height: 40,
    color: "#4CAF50",
    speed: 6
};

let bullets = [];
let enemies = [];
let particles = []; // Chứa hiệu ứng nổ tung
let enemySpeed = 1.8;
let spawnTimer = 0;
let moveLeft = false;
let moveRight = false;

// Đón nhận thao tác bấm nút di chuyển
document.getElementById("btnLeft").addEventListener("pointerdown", () => moveLeft = true);
document.getElementById("btnLeft").addEventListener("pointerup", () => moveLeft = false);
document.getElementById("btnRight").addEventListener("pointerdown", () => moveRight = true);
document.getElementById("btnRight").addEventListener("pointerup", () => moveRight = false);

// Chạm vào vùng màn hình game để bắn đạn
canvas.addEventListener("pointerdown", function(e) {
    if (gameOver) {
        resetGame();
        return;
    }

    // Nếu điểm >= 50: Kích hoạt ĐẠN ĐÔI (Laser) cực mạnh
    if (score >= 50) {
        bullets.push({ x: player.x + 4, y: player.y, width: 6, height: 18, color: "#00E676", speed: 9 });
        bullets.push({ x: player.x + player.width - 10, y: player.y, width: 6, height: 18, color: "#00E676", speed: 9 });
    } else {
        // Đạn đơn thông thường
        bullets.push({ x: player.x + player.width / 2 - 4, y: player.y, width: 8, height: 15, color: "#FFEA00", speed: 8 });
    }
});

// Hàm tạo hiệu ứng nổ hoa cải
function createExplosion(x, y) {
    for (let i = 0; i < 12; i++) {
        particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            radius: Math.random() * 3 + 2,
            color: Math.random() > 0.5 ? "#FF5722" : "#FFCC00",
            alpha: 1
        });
    }
}

function resetGame() {
    score = 0; level = 1; enemySpeed = 1.8;
    scoreEl.innerText = score; levelEl.innerText = level;
    bullets = []; enemies = []; particles = [];
    player.x = canvas.width / 2 - 20;
    gameOver = false;
    update();
}

function update() {
    if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "bold 24px Arial";
        ctx.fillText("GAME OVER", canvas.width / 2 - 70, canvas.height / 2 - 10);
        ctx.font = "16px Arial";
        ctx.fillText("Chạm màn hình chơi để thử lại", canvas.width / 2 - 100, canvas.height / 2 + 25);
        return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Xử lý di chuyển xe tăng của bạn dựa trên nút bấm
    if (moveLeft && player.x > 0) player.x -= player.speed;
    if (moveRight && player.x < canvas.width - player.width) player.x += player.speed;

    // Vẽ Xe tăng người chơi
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
    // Vẽ nòng súng kép nếu đạt cấp độ cao
    if (score >= 50) {
        ctx.fillRect(player.x + 4, player.y - 12, 6, 12);
        ctx.fillRect(player.x + player.width - 10, player.y - 12, 6, 12);
    } else {
        ctx.fillRect(player.x + player.width / 2 - 5, player.y - 12, 10, 12);
    }

    // Quản lý đạn bay
    bullets.forEach((bullet, bIndex) => {
        bullet.y -= bullet.speed;
        ctx.fillStyle = bullet.color;
        ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
        if (bullet.y < 0) bullets.splice(bIndex, 1);
    });

    // Tạo địch rơi từ trên xuống
    spawnTimer++;
    if (spawnTimer % Math.max(30, 60 - level * 5) === 0) {
        enemies.push({ x: Math.random() * (canvas.width - 35), y: -35, width: 35, height: 35, color: "#E91E63" });
    }

    // Điều khiển địch và kiểm tra va chạm
    enemies.forEach((enemy, eIndex) => {
        enemy.y += enemySpeed;
        ctx.fillStyle = enemy.color;
        ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);

        if (enemy.y + enemy.height >= canvas.height) {
            gameOver = true;
        }

        bullets.forEach((bullet, bIndex) => {
            if (
                bullet.x < enemy.x + enemy.width &&
                bullet.x + bullet.width > enemy.x &&
                bullet.y < enemy.y + enemy.height &&
                bullet.y + bullet.height > enemy.y
            ) {
                createExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2);
                enemies.splice(eIndex, 1);
                bullets.splice(bIndex, 1);
                score += 10;
                scoreEl.innerText = score;

                // Tăng cấp độ và tốc độ rơi sau mỗi 60 điểm
                if (score % 60 === 0) {
                    level++;
                    enemySpeed += 0.4;
                    levelEl.innerText = level;
                }
            }
        });
    });

    // Xử lý vẽ và làm biến mất các hạt nổ
    particles.forEach((p, pIndex) => {
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.03;
        if (p.alpha <= 0) {
            particles.splice(pIndex, 1);
        } else {
            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    });

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
