<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Game Xe Tăng - Phím Cảm Ứng Xịn</title>
<style>
    body {
        margin: 0; padding: 0; background-color: #111; color: white;
        font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; text-align: center; user-select: none;
        touch-action: none; /* Ngăn chặn trình duyệt bị kéo cuộn màn hình khi đang chơi */
    }
    .info { padding: 12px; font-size: 18px; font-weight: bold; background: #000; border-bottom: 2px solid #333; }
    #gameCanvas { background-color: #1a1a2e; display: block; margin: 0 auto; }
    
    /* Giao diện bộ nút điều khiển cảm ứng to rõ, chống bấm trượt */
    .controls {
        display: flex; justify-content: space-between; align-items: center;
        padding: 10px 15px; background: #000; height: 95px; box-sizing: border-box;
    }
    .btn-ctrl {
        width: 46%; height: 75px; background-color: #222; border: 3px solid #00e676;
        color: #00e676; font-size: 26px; font-weight: bold; border-radius: 18px;
        outline: none; transition: background-color 0.1s, color 0.1s;
        -webkit-tap-highlight-color: transparent; /* Xóa khung viền vàng mặc định của trình duyệt khi chạm */
    }
    /* Hiệu ứng chớp sáng đổi màu khi ngón tay đang chạm giữ trên màn hình */
    .btn-ctrl:active { 
        background-color: #00e676 !important; 
        color: black !important; 
    }
    .btn-back {
        display: inline-block; padding: 10px 20px; background-color: #ff5722;
        color: white; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 5px;
    }
</style>
</head>
<body>

<div class="info">Màn: <span id="level" style="color: #00e676;">1</span> | Điểm: <span id="score">0</span>/<span id="targetScore">100</span> | Mạng: <span id="hp" style="color: #ff5252;">❤️❤️❤️</span></div>
<canvas id="gameCanvas"></canvas>

<!-- Bộ nút điều khiển cảm ứng tối ưu cho hai ngón cái -->
<div class="controls">
    <button class="btn-ctrl" id="btnLeft">◀ TRÁI</button>
    <button class="btn-ctrl" id="btnRight">PHẢI ▶</button>
</div>

<div style="padding: 3px; font-size: 13px; color: #888;">Chạm vào nửa trên màn hình để BẮN ĐẠN!</div>
<a href="index.html" class="btn-back">⬅ Về trang chủ</a>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const targetScoreEl = document.getElementById("targetScore");
const levelEl = document.getElementById("level");
const hpEl = document.getElementById("hp");

// Tự động tính toán khung hình phù hợp chiều cao nút bấm mới
canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 205;

let score = 0;
let level = 1;
let targetScore = 100; 
let hp = 3;
let gameOver = false;
let levelUpgraded = false; 

const player = {
    x: canvas.width / 2 - 20,
    y: canvas.height - 50,
    width: 40,
    height: 40,
    color: "#00E676",
    speed: 10 
};

let bullets = [];        
let enemyBullets = [];   
let enemies = [];        
let items = [];          
let particles = [];      

let enemySpeed = 0.8;       
let enemyBulletSpeed = 1.3; 
let spawnTimer = 0;
let moveLeft = false;
let moveRight = false;

// SỬ DỤNG SỰ KIỆN POINTER GIÚP PHÍM BẤM NHẠY VÀ CHÍNH XÁC TRÊN ĐIỆN THOẠI
const btnLeft = document.getElementById("btnLeft");
const btnRight = document.getElementById("btnRight");

btnLeft.addEventListener("pointerdown", (e) => { e.preventDefault(); moveLeft = true; });
btnLeft.addEventListener("pointerup", (e) => { e.preventDefault(); moveLeft = false; });
btnLeft.addEventListener("pointerleave", (e) => { e.preventDefault(); moveLeft = false; });

btnRight.addEventListener("pointerdown", (e) => { e.preventDefault(); moveRight = true; });
btnRight.addEventListener("pointerup", (e) => { e.preventDefault(); moveRight = false; });
btnRight.addEventListener("pointerleave", (e) => { e.preventDefault(); moveRight = false; });

// Bắn đạn khi chạm vào vùng canvas trò chơi
canvas.addEventListener("pointerdown", function(e) {
    e.preventDefault();
    if (gameOver) { resetGame(); return; }
    if (levelUpgraded) { nextLevel(); return; }

    bullets.push({ x: player.x + player.width/2 - 4, y: player.y, width: 8, height: 20, color: "#FFEA00", vx: 0, vy: -12 });
    bullets.push({ x: player.x, y: player.y, width: 8, height: 20, color: "#FFEA00", vx: -1.5, vy: -11 });
    bullets.push({ x: player.x + player.width - 8, y: player.y, width: 8, height: 20, color: "#FFEA00", vx: 1.5, vy: -11 });
});

function createExplosion(x, y, color = "#FF9100") {
    for (let i = 0; i < 10; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5,
            radius: Math.random() * 3 + 2,
            color: color,
            alpha: 1
        });
    }
}

function updateHPDisplay() {
    let hearts = "";
    for (let i = 0; i < hp; i++) hearts += "❤️";
    hpEl.innerText = hearts || "💀";
}

function resetGame() {
    score = 0; level = 1; targetScore = 100; enemySpeed = 0.8; enemyBulletSpeed = 1.3;
    scoreEl.innerText = score; targetScoreEl.innerText = targetScore; levelEl.innerText = level;
    updateHPDisplay();
    bullets = []; enemyBullets = []; enemies = []; items = []; particles = [];
    player.x = canvas.width / 2 - 20;
    gameOver = false; levelUpgraded = false;
    update();
}

function nextLevel() {
    level++;
    score = 0;
    targetScore = 100 + level * 50; 
    enemySpeed += 0.15; 
    
    scoreEl.innerText = score; targetScoreEl.innerText = targetScore; levelEl.innerText = level;
    bullets = []; enemyBullets = []; enemies = []; items = []; particles = [];
    levelUpgraded = false;
    update();
}

function update() {
    if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white"; ctx.font = "bold 26px Arial"; ctx.fillText("TRÒ CHƠI KẾT THÚC", canvas.width / 2 - 125, canvas.height / 2 - 10);
        ctx.font = "16px Arial"; ctx.fillText("Chạm màn hình để chơi lại", canvas.width / 2 - 95, canvas.height / 2 + 30);
        return;
    }

    if (levelUpgraded) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00E676"; ctx.font = "bold 28px Arial"; ctx.fillText("🎉 QUA MÀN " + level + "! 🎉", canvas.width / 2 - 100, canvas.height / 2 - 10);
        ctx.fillStyle = "white"; ctx.font = "18px Arial"; ctx.fillText("Chạm màn hình để sang MÀN " + (level + 1), canvas.width / 2 - 120, canvas.height / 2 + 35);
        return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Di chuyển xe tăng mượt mà liên tục khi đang nhấn giữ phím
    if (moveLeft && player.x > 0) player.x -= player.speed;
    if (moveRight && player.x < canvas.width - player.width) player.x += player.speed;

    // Vẽ xe tăng của bạn
    ctx.fillStyle = player.color; ctx.fillRect(player.x, player.y, player.width, player.height);
    ctx.fillStyle = "#FFF"; ctx.fillRect(player.x + player.width/2 - 4, player.y - 12, 8, 12);

    // Đạn của bạn bay
    bullets.forEach((b, bIndex) => {
        b.x += b.vx; b.y += b.vy;
        ctx.fillStyle = b.color; ctx.fillRect(b.x, b.y, b.width, b.height);
        if (b.y < 0 || b.x < 0 || b.x > canvas.width) bullets.splice(bIndex, 1);
    });

    // Đạn địch bay xuống
    enemyBullets.forEach((eb, ebIndex) => {
        eb.y += eb.speed;
        ctx.fillStyle = eb.color; ctx.fillRect(eb.x, eb.y, eb.width, eb.height);

        if (eb.x < player.x + player.width && eb.x + eb.width > player.x && eb.y < player.y + player.height && eb.y + eb.height > player.y) {
            enemyBullets.splice(ebIndex, 1);
            hp--; updateHPDisplay();
            createExplosion(player.x + player.width/2, player.y + player.height/2, "#FF1744");
            if (hp <= 0) gameOver = true;
        }
        if (eb.y > canvas.height) enemyBullets.splice(ebIndex, 1);
    });

    // Quân địch xuất hiện thưa thớt dễ chịu
    spawnTimer++;
    if (spawnTimer % Math.max(80, 140 - level * 5) === 0) {
        enemies.push({ x: Math.random() * (canvas.width - 35), y: -35, width: 35, height: 35, color: "#FF1744" });
    }

    // Hộp cứu thương rơi
    if (spawnTimer % 180 === 0 && hp < 5) {
        items.push({ x: Math.random() * (canvas.width - 25), y: -25, size: 25 });
    }

    items.forEach((item, iIndex) => {
        item.y += 1.5;
        ctx.fillStyle = "#FFF"; ctx.fillRect(item.x, item.y, item.size, item.size);
        ctx.fillStyle = "#FF1744";
        ctx.fillRect(item.x + item.size/2 - 2, item.y + 4, 4, item.size - 8);
        ctx.fillRect(item.x + 4, item.y + item.size/2 - 2, item.size - 8, 4);

        if (item.x < player.x + player.width && item.x + item.size > player.x && item.y < player.y + player.height && item.y + item.size > player.y) {
            items.splice(iIndex, 1);
            hp++; updateHPDisplay();
        }
        if (item.y > canvas.height) items.splice(iIndex, 1);
    });

    // Quản lý xe tăng địch
    enemies.forEach((enemy, eIndex) => {
        enemy.y += enemySpeed;
        ctx.fillStyle = enemy.color; ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);

        if (Math.random() < 0.003) {
            enemyBullets.push({ x: enemy.x + enemy.width/2 - 3, y: enemy.y + enemy.height, width: 6, height: 12, color: "#FF1744", speed: enemyBulletSpeed });
        }

        if (enemy.y + enemy.height >= canvas.height) {
            enemies.splice(eIndex, 1);
            hp--; updateHPDisplay();
            if (hp <= 0) gameOver = true;
        }

        bullets.forEach((b, bIndex) => {
            if (b.x < enemy.x + enemy.width && b.x + b.width > enemy.x && b.y < enemy.y + enemy.height && b.y + b.height > enemy.y) {
