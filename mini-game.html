<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Siêu Chiến Dịch Xe Tăng - Bản Nâng Cấp Toàn Diện</title>
<style>
    body {
        margin: 0; padding: 0; background-color: #080810; color: white;
        font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; text-align: center; user-select: none;
        touch-action: none;
    }
    .info { 
        position: absolute; top: 0; left: 0; width: 100%;
        padding: 15px 0; font-size: 16px; font-weight: bold; 
        background: linear-gradient(to bottom, rgba(0,0,0,0.85), rgba(0,0,0,0)); 
        z-index: 10; display: flex; justify-content: space-around; box-sizing: border-box;
    }
    #gameCanvas { background-color: #0b0c16; display: block; }
    
    .btn-back {
        position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
        padding: 8px 22px; background-color: rgba(255, 87, 34, 0.85);
        color: white; text-decoration: none; border-radius: 20px; font-size: 13px; font-weight: bold;
        z-index: 10; border: 1px solid #ff7043; backdrop-filter: blur(4px);
    }
    .guide-text {
        position: absolute; bottom: 55px; left: 0; width: 100%;
        font-size: 11px; color: rgba(255,255,255,0.4); z-index: 9; pointer-events: none;
        letter-spacing: 0.5px;
    }
</style>
</head>
<body>

<div class="info">
    <div>Màn: <span id="level" style="color: #00e676;">1</span></div>
    <div>Điểm: <span id="score" style="color: #ffea00;">0</span>/<span id="targetScore">100</span></div>
    <div>Mạng: <span id="hp">❤️❤️❤️❤️❤️</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<div class="guide-text">Chạm NỬA TRÊN để BẮN | Giữ NỬA DƯỚI TRÁI/PHẢI để DI CHUYỂN</div>
<a href="index.html" class="btn-back">⬅ Về trang chủ</a>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const targetScoreEl = document.getElementById("targetScore");
const levelEl = document.getElementById("level");
const hpEl = document.getElementById("hp");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// KHỞI TẠO ÂM THANH KHÔNG CẦN FILE MP3 (Web Audio API)
let audioCtx = null;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        startBackgroundMusic();
    }
}

function playSound(type) {
    if (!audioCtx) return;
    try {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'shoot') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
            osc.start(); osc.stop(audioCtx.currentTime + 0.12);
        } else if (type === 'explosion') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(10, audioCtx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        } else if (type === 'item') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    } catch(e) {}
}

function startBackgroundMusic() {
    setInterval(() => {
        if (!audioCtx || gameOver || levelUpgraded) return;
        try {
            let notes = [130.81, 146.83, 164.81, 196.00];
            let note = notes[Math.floor(Math.random() * notes.length)];
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(note, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        } catch(e) {}
    }, 300);
}

// CẤU HÌNH BIẾN GAME (Xe thu nhỏ còn 32x32 cho màn hình rộng rãi)
let score = 0;
let level = 1;
let targetScore = 100; 
let hp = 5; // Tăng mạng cho dễ thở
let gameOver = false;
let levelUpgraded = false; 

const player = {
    x: canvas.width / 2 - 16,
    y: canvas.height - 110,
    width: 32,
    height: 32,
    color: "#00E676",
    speed: 6.5,
    weaponLevel: 1, // Cấp độ đạn: 1, 2, 3 tương ứng 1 tia, 3 tia, 5 tia
    powerupTimer: 0
};

let bullets = [];        
let enemyBullets = [];   
let enemies = [];        
let items = [];          
let particles = [];      

let enemyBaseSpeed = 0.65; // Giảm tốc độ cơ bản cho người chơi dễ thở
let enemyBulletSpeed = 1.3; 
let spawnTimer = 0;
let moveLeft = false;
let moveRight = false;

// ĐIỀU KHIỂN CẢM ỨNG CẢ TIẾN
window.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    initAudio();
    activeTouches[e.pointerId] = { x: e.clientX, y: e.clientY };
    checkControls();
    
    if (e.clientY < canvas.height * 0.65) {
        if (gameOver) { resetGame(); return; }
        if (levelUpgraded) { nextLevel(); return; }
        fireBullet();
    }
});

window.addEventListener("pointermove", (e) => {
    if (activeTouches[e.pointerId]) {
        activeTouches[e.pointerId] = { x: e.clientX, y: e.clientY };
        checkControls();
    }
});

const touchEndHandler = (e) => { delete activeTouches[e.pointerId]; checkControls(); };
window.addEventListener("pointerup", touchEndHandler);
window.addEventListener("pointercancel", touchEndHandler);

const activeTouches = {};

function checkControls() {
    moveLeft = false; moveRight = false;
    for (let id in activeTouches) {
        let touch = activeTouches[id];
        if (touch.y >= canvas.height * 0.65) {
            if (touch.x < canvas.width / 2) moveLeft = true;
            else moveRight = true;
        }
    }
}

function fireBullet() {
    playSound('shoot');
    let centerX = player.x + player.width/2;
    
    if (player.weaponLevel === 1) {
        bullets.push({ x: centerX - 3, y: player.y - 8, width: 6, height: 18, color: "#FFEA00", vx: 0, vy: -12 });
    } else if (player.weaponLevel === 2) {
        bullets.push({ x: centerX - 3, y: player.y - 8, width: 6, height: 18, color: "#00E5FF", vx: 0, vy: -12 });
        bullets.push({ x: player.x, y: player.y, width: 6, height: 16, color: "#00E5FF", vx: -1.5, vy: -11 });
        bullets.push({ x: player.x + player.width - 6, y: player.y, width: 6, height: 16, color: "#00E5FF", vx: 1.5, vy: -11 });
    } else { // Max đạn 5 tia chùm siêu mạnh
        bullets.push({ x: centerX - 3, y: player.y - 8, width: 6, height: 18, color: "#FF1744", vx: 0, vy: -13 });
        bullets.push({ x: player.x, y: player.y, width: 6, height: 16, color: "#FF3D00", vx: -2, vy: -12 });
        bullets.push({ x: player.x + player.width - 6, y: player.y, width: 6, height: 16, color: "#FF3D00", vx: 2, vy: -12 });
        bullets.push({ x: player.x - 6, y: player.y + 6, width: 6, height: 14, color: "#FF9100", vx: -4, vy: -10 });
        bullets.push({ x: player.x + player.width, y: player.y + 6, width: 6, height: 14, color: "#FF9100", vx: 4, vy: -10 });
    }
}

function drawTank(x, y, width, height, baseColor, isEnemy = false, type = 'normal') {
    ctx.save();
    // Xích xe hai bên hông
    ctx.fillStyle = "#252528";
    ctx.fillRect(x - 3, y + 3, 4, height - 6);
    ctx.fillRect(x + width - 1, y + 3, 4, height - 6);
    
    // Thân xe thiết kế đổ bóng nhẹ
    ctx.fillStyle = baseColor;
    ctx.fillRect(x, y, width, height);
    
    // Điểm nhấn thiết kế riêng cho xe Thiết Giáp (Trâu bò)
    if (type === 'heavy') {
        ctx.fillStyle = "#424242";
        ctx.fillRect(x + 4, y + 4, width - 8, 4);
    }

    // Tháp pháo tròn
    ctx.fillStyle = isEnemy ? "#15151a" : "#006030";
    ctx.beginPath(); ctx.arc(x + width/2, y + height/2, width/3.5, 0, Math.PI * 2); ctx.fill();
    
    // Nòng pháo
    ctx.fillStyle = "#ffffff";
    if (isEnemy) ctx.fillRect(x + width/2 - 3, y + height, 6, 11);
    else ctx.fillRect(x + width/2 - 3, y - 11, 6, 11);
    
    ctx.restore();
}

function createExplosion(x, y, color = "#FF9100") {
    playSound('explosion');
    for (let i = 0; i < 12; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            radius: Math.random() * 3 + 1.5,
            color: color,
            alpha: 1
        });
    }
}

function updateHPDisplay() {
    let hearts = "";
    for (let i = 0; i < hp; i++) hearts += "❤️";
    hpEl.innerText = hearts || "💀";
}

function resetGame() {
    score = 0; level = 1; targetScore = 100; hp = 5;
    scoreEl.innerText = score; targetScoreEl.innerText = targetScore; levelEl.innerText = level;
    updateHPDisplay();
    player.weaponLevel = 1; player.powerupTimer = 0;
    bullets = []; enemyBullets = []; enemies = []; items = []; particles = [];
    player.x = canvas.width / 2 - 16;
    gameOver = false; levelUpgraded = false;
    update();
}

function nextLevel() {
    level++; score = 0; targetScore = 100 + level * 50;
