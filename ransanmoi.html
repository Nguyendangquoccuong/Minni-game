
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rắn Săn Mồi Không Gian</title>
    <style>
        body { margin: 0; background-color: #0b0c16; color: white; font-family: Arial, sans-serif; text-align: center; }
        canvas { background-color: #161730; display: block; margin: 20px auto; border: 2px solid #ff9100; border-radius: 10px; }
        .score { font-size: 24px; color: #ff9100; font-weight: bold; margin-top: 20px; }
        .btn-back { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #333; color: white; text-decoration: none; border-radius: 20px; }
        .controls { display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; justify-content: center; margin-top: 15px; }
        .btn-ctrl { width: 60px; height: 60px; background: #222; border: 2px solid #ff9100; color: white; font-size: 20px; font-weight: bold; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="score">Điểm: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas" width="300" height="300"></canvas>
    
    <!-- Nút bấm điều khiển trên điện thoại -->
    <div class="controls">
        <td></td><button class="btn-ctrl" onclick="changeDir('UP')">▲</button><td></td>
        <button class="btn-ctrl" onclick="changeDir('LEFT')">◀</button><td></td><button class="btn-ctrl" onclick="changeDir('RIGHT')">▶</button>
        <td></td><button class="btn-ctrl" onclick="changeDir('DOWN')">▼</button><td></td>
    </div>

    <br><a href="mini-game.html" class="btn-back">⬅ Quay lại danh sách</a>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const box = 15;
        let snake = [{x: 10 * box, y: 10 * box}];
        let food = { x: Math.floor(Math.random() * 20) * box, y: Math.floor(Math.random() * 20) * box };
        let score = 0;
        let d = "RIGHT";

        function changeDir(dir) {
            if(dir == "LEFT" && d != "RIGHT") d = "LEFT";
            if(dir == "UP" && d != "DOWN") d = "UP";
            if(dir == "RIGHT" && d != "LEFT") d = "RIGHT";
            if(dir == "DOWN" && d != "UP") d = "DOWN";
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#ff9100" : "#fff";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }
            ctx.fillStyle = "red";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if(d == "LEFT") snakeX -= box;
            if(d == "UP") snakeY -= box;
            if(d == "RIGHT") snakeX += box;
            if(d == "DOWN") snakeY += box;

            if(snakeX == food.x && snakeY == food.y) {
                score++;
                document.getElementById("scoreVal").innerText = score;
                food = { x: Math.floor(Math.random() * 20) * box, y: Math.floor(Math.random() * 20) * box };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("Game Over! Điểm của bạn: " + score);
                location.reload();
            }
            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i=0; i<array.length; i++) { if(head.x == array[i].x && head.y == array[i].y) return true; }
            return false;
        }

        let game = setInterval(draw, 150);
    </script>
</body>
  </html>
