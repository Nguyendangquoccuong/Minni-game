<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phim Bom Tấn Nổi Bật - Minni World</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0d0e15; color: white; font-family: 'Segoe UI', Arial, sans-serif; }
        
        .container { padding: 20px; max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
        
        .section-title { font-size: 18px; font-weight: bold; border-left: 4px solid #ff003c; padding-left: 10px; margin: 20px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        /* LƯỚI PHIM VÀ THẺ PHIM */
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        /* Biến toàn bộ thẻ phim thành một nút bấm có thể click */
        .movie-card { background-color: #141622; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; text-decoration: none; color: inherit; transition: transform 0.2s, box-shadow: 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .movie-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255, 0, 60, 0.2); border-color: rgba(255, 0, 60, 0.3); }
        
        /* Khung chứa ảnh và nút Play */
        .thumbnail-container { position: relative; width: 100%; padding-top: 140%; /* Tạo tỷ lệ khung hình dọc */ background-color: #1a1c2e; overflow: hidden; }
        
        /* Sửa lỗi hiển thị ảnh bìa */
        .thumbnail-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        /* Nút Play màu đỏ ở trung tâm */
        .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background-color: #ff003c; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(255,0,60,0.6); transition: 0.2s; z-index: 2; }
        .play-btn::after { content: ''; display: block; width: 0; height: 0; border-top: 10px solid transparent; border-bottom: 10px solid transparent; border-left: 16px solid white; margin-left: 4px; }
        .movie-card:hover .play-btn { transform: translate(-50%, -50%) scale(1.1); background-color: #ff2a5f; box-shadow: 0 0 25px rgba(255,0,60,0.9); }
        
        /* Phần thông tin chữ bên dưới */
        .movie-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .movie-title { font-size: 14px; font-weight: bold; margin-bottom: 4px; color: #fff; line-height: 1.4; }
        .movie-genre { font-size: 11px; color: #ff0055; font-weight: 500; }
        
        /* NÚT QUAY LẠI TRANG CHỦ */
        .btn-back-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 0; background: linear-gradient(to top, #0d0e15 70%, transparent); text-align: center; z-index: 10; }
        .btn-back { display: inline-block; padding: 10px 35px; background: #ff003c; color: white; text-decoration: none; border-radius: 25px; font-size: 14px; font-weight: bold; box-shadow: 0 4px 15px rgba(255,0,60,0.4); transition: 0.2s; }
        .btn-back:hover { background: #ff2a5f; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="container">
        <div class="section-title">Phim Bom Tấn Nổi Bật</div>
        
        <div class="movie-grid">
            
            <!-- THẺ PHIM 1: KẺ TRỘM MẶT TRĂNG 4 -->
            <!-- Thay link xem phim của bạn vào chỗ href="#" bên dưới -->
            <a href="link-xem-phim-minions.html" class="movie-card">
                <div class="thumbnail-container">
                    <!-- Lưu ý: Thay đổi src thành đường dẫn ảnh đúng trên github của bạn -->
                    <img src="images/minions4.jpg" alt="Kẻ Trộm Mặt Trăng 4">
                    <div class="play-btn"></div>
                </div>
                <div class="movie-info">
                    <div class="movie-title">Kẻ Trộm Mặt Trăng 4</div>
                    <div class="movie-genre">Hoạt Hình / Hài Hước</div>
                </div>
            </a>

            <!-- THẺ PHIM 2: FAST & FURIOUS -->
            <a href="link-xem-phim-fast.html" class="movie-card">
                <div class="thumbnail-container">
                    <img src="images/fast-furious.jpg" alt="Fast & Furious">
                    <div class="play-btn"></div>
                </div>
                <div class="movie-info">
                    <div class="movie-title">Fast & Furious</div>
                    <div class="movie-genre">Hành Động / Đua Xe</div>
                </div>
            </a>

            <!-- THẺ PHIM 3: GODZILLA X KONG -->
            <a href="link-xem-phim-godzilla.html" class="movie-card">
                <div class="thumbnail-container">
                    <img src="images/godzilla.jpg" alt="Godzilla x Kong">
                    <div class="play-btn"></div>
                </div>
                <div class="movie-info">
                    <div class="movie-title">Godzilla x Kong</div>
                    <div class="movie-genre">Viễn Tưởng / Quái Vật</div>
                </div>
            </a>

            <!-- THẺ PHIM 4: THE CONJURING -->
            <a href="link-xem-phim-conjuring.html" class="movie-card">
                <div class="thumbnail-container">
                    <img src="images/conjuring.jpg" alt="The Conjuring">
                    <div class="play-btn"></div>
                </div>
                <div class="movie-info">
                    <div class="movie-title">The Conjuring</div>
                    <div class="movie-genre">Kinh Dị / Tâm Linh</div>
                </div>
            </a>

        </div>
    </div>

    <div class="btn-back-container">
        <a href="index.html" class="btn-back">← Về trang chủ</a>
    </div>

</body>
                    </html>
