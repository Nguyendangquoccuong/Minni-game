<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MINNI NEWS - Cập Nhật Liên Tục 24/7</title>
<style>
    body {
        margin: 0; padding: 0; background-color: #0b0c16; color: white;
        font-family: 'Segoe UI', Arial, sans-serif; text-align: center;
    }
    
    /* Header đồng bộ phong cách giải trí MINNI WORLD */
    .header {
        background: linear-gradient(135deg, #1e88e5, #1565c0); color: white;
        padding: 20px 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .header h1 { margin: 0; font-size: 26px; letter-spacing: 1px; }
    .header p { margin: 5px 0 0 0; font-size: 13px; color: #e3f2fd; }

    /* Thanh chọn nguồn báo nhanh */
    .news-tabs {
        display: flex; justify-content: center; gap: 10px; padding: 15px;
        background-color: #161730; border-bottom: 2px solid #222;
    }
    .tab-btn {
        background-color: #222545; border: 2px solid #1e88e5; color: white;
        padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 13px;
    }
    .tab-btn:active { background-color: #1e88e5; }

    /* Khung hiển thị luồng tin tức trực tiếp từ tòa soạn */
    .news-frame-container {
        width: 100%; max-width: 600px; margin: 15px auto; padding: 0 10px; box-sizing: border-box;
    }
    iframe {
        width: 100%; height: 75vh; border: 3px solid #222; border-radius: 12px;
        background-color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .footer { margin: 20px 0 30px 0; }
    .btn-back {
        display: inline-block; padding: 10px 24px; background-color: #ff5722;
        color: white; text-decoration: none; border-radius: 20px; font-weight: bold; font-size: 14px;
    }
</style>
</head>
<body>

    <div class="header">
        <h1>📰 MINNI NEWS 24H</h1>
        <p>Tin tức đa dạng, luồng báo chí cập nhật liên tục từng phút</p>
    </div>

    <!-- Các nút nhấn chuyển đổi nhanh giữa các nguồn báo uy tín ngay trên màn hình điện thoại -->
    <div class="news-tabs">
        <button class="tab-btn" onclick="changeSource('https://vnexpress.net/tin-tuc-24h')">VnExpress 24h</button>
        <button class="tab-btn" onclick="changeSource('https://dantri.com.vn/tin-moi-nhat.htm')">Dân Trí Mới</button>
        <button class="tab-btn" onclick="changeSource('https://vnexpress.net/thoi-su')">Thời Sự</button>
    </div>

    <div class="news-frame-container">
        <!-- Khung nhúng thông minh hiển thị trực tiếp giao diện báo điện tử -->
        <iframe id="newsFrame" src="https://vnexpress.net/tin-tuc-24h"></iframe>
    </div>

    <div class="footer">
        <a href="index.html" class="btn-back">⬅ Quay về trang chủ</a>
    </div>

<script>
    // Hàm xử lý đổi nguồn tin tức mượt mà khi người dùng chạm nút
    function changeSource(url) {
        document.getElementById('newsFrame').src = url;
    }
</script>

</body>
</html>
