<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minni World Automated News</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0d0e15; color: white; font-family: 'Segoe UI', Arial, sans-serif; }
        
        /* HEADER ĐỒNG BỘ PHONG CÁCH NEON */
        .header-news { background: linear-gradient(135deg, #0f1123, #1a1c38); padding: 30px 20px; text-align: center; border-bottom: 2px solid #00ffcc; box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); }
        .header-news h1 { font-size: 24px; margin: 0 0 10px 0; color: #fff; text-shadow: 0 0 10px #00ffcc; font-weight: 800; letter-spacing: 1px; }
        .header-news p { font-size: 13px; margin: 0; color: #8a8dbe; line-height: 1.5; }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; padding-bottom: 90px; }

        /* NÚT ĐỔI TIN TỨC */
        .btn-action-container { text-align: center; margin-bottom: 25px; }
        .btn-refresh { padding: 10px 25px; background: linear-gradient(45deg, #00ffcc, #0099ff); border: none; color: #060713; font-size: 14px; font-weight: bold; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,255,204,0.3); transition: 0.2s; }
        .btn-refresh:hover { transform: scale(1.03); box-shadow: 0 0 20px #00ffcc; }

        /* DANH SÁCH BÀI VIẾT (FIX LỖI HIỂN THỊ) */
        .news-list { display: flex; flex-direction: column; gap: 15px; }
        
        .news-card { background-color: #141622; border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); text-decoration: none; color: inherit; transition: 0.2s; display: block; }
        .news-card:hover { transform: translateY(-2px); border-color: #00ffcc; box-shadow: 0 4px 15px rgba(0, 255, 204, 0.1); }
        
        .news-tag { font-size: 10px; font-weight: bold; color: #00ffcc; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .news-title { font-size: 15px; font-weight: bold; line-height: 1.4; margin-bottom: 8px; color: #fff; }
        .news-desc { font-size: 13px; color: #8a8dbe; line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .news-time { font-size: 11px; color: #5c5f85; text-align: right; }

        /* NÚT QUAY LẠI TRANG CHỦ */
        .btn-back-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 0; background: linear-gradient(to top, #0d0e15 70%, transparent); text-align: center; z-index: 10; }
        .btn-back { display: inline-block; padding: 9px 30px; background-color: rgba(20, 22, 50, 0.8); border: 1px solid rgba(0, 255, 204, 0.3); color: #00ffcc; text-decoration: none; border-radius: 20px; font-size: 13px; backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.2s; }
        .btn-back:hover { background: #00ffcc; color: #060713; box-shadow: 0 0 15px #00ffcc; }
    </style>
</head>
<body>

    <div class="header-news">
        <h1>📰 MINNI WORLD AUTOMATED NEWS</h1>
        <p>Hệ thống tự động cập nhật Tin công nghệ & Thị trường Tài chính 24h</p>
    </div>

    <div class="container">
        <div class="btn-action-container">
            <button class="btn-refresh" onclick="loadAutomatedNews()">🔄 Đổi Tin Tức Khác</button>
        </div>
        
        <!-- Khu vực hiển thị tin tức đã sửa lỗi -->
        <div class="news-list" id="newsContent">
            <!-- JavaScript sẽ tự động chèn các thẻ bài viết vào đây -->
        </div>
    </div>

    <div class="btn-back-container">
        <a href="index.html" class="btn-back">← Về trang chủ</a>
    </div>

    <script>
        // Kho dữ liệu tin tức tự động dự phòng (Tránh lỗi API bị sập hoặc trống trang)
        const backupNewsData = [
            { title: "Kỷ nguyên AI bùng nổ mạnh mẽ trong năm nay", desc: "Các mô hình ngôn ngữ lớn liên tục tối ưu hóa hiệu năng, giúp tự động hóa 70% công việc lập trình và thiết kế giao diện web cơ bản.", tag: "CÔNG NGHỆ", time: "Vừa xong" },
            { title: "Thị trường bất động sản ghi nhận dấu hiệu phục hồi", desc: "Lượng giao dịch đất nền phân khúc giá rẻ tăng nhẹ tại các khu vực vùng ven đô thị nhờ lãi suất ngân hàng duy trì ở mức ổn định.", tag: "TÀI CHÍNH", time: "15 phút trước" },
            { title: "Ra mắt thế hệ vi xử lý máy tính mới tiết kiệm điện", desc: "Chip kiến trúc mới giúp tăng tốc xử lý tác vụ đồ họa hạt nhân lên 45% nhưng tiêu thụ năng lượng ít hơn một nửa.", tag: "CÔNG NGHỆ", time: "42 phút trước" },
            { title: "Xu hướng đầu tư tài sản số chuyển dịch sang tính ổn định", desc: "Giới đầu tư toàn cầu bắt đầu ưu tiên các quỹ tài chính có bảo chứng an toàn thay vì chạy theo các đợt sóng đầu cơ mạo hiểm.", tag: "TÀI CHÍNH", time: "1 giờ trước" },
            { title: "Hệ thống hiển thị không gian vũ trụ được giả lập thành công", desc: "Các nhà khoa học sử dụng siêu máy tính lượng tử để dựng lại mô hình vụ nổ tinh vân với độ chi tiết siêu cao.", tag: "KHOA HỌC", time: "2 giờ trước" },
            { title: "Ứng dụng công nghệ blockchain vào quản lý chuỗi cung ứng", desc: "Giải pháp giúp minh bạch hóa 100% nguồn gốc xuất xứ hàng hóa, giảm thiểu chi phí vận hành kho bãi cho doanh nghiệp.", tag: "CÔNG NGHỆ", time: "3 giờ trước" }
        ];

        function loadAutomatedNews() {
            const container = document.getElementById("newsContent");
            container.innerHTML = ""; // Xóa nội dung cũ trước khi nạp tin mới

            // Trộn ngẫu nhiên mảng tin tức để tạo hiệu ứng "Đổi tin tức khác"
            const shuffledNews = [...backupNewsData].sort(() => 0.5 - Math.random());
            
            // Lấy ngẫu nhiên 3-4 bài viết để hiển thị mỗi lần bấm nút
            const selectedNews = shuffledNews.slice(0, 4);

            selectedNews.forEach(item => {
                const card = document.createElement("a");
                card.href = "#"; // Bạn có thể cấu hình link chi tiết bài viết tại đây
                card.className = "news-card";
                
                card.innerHTML = `
                    <div class="news-tag">${item.tag}</div>
                    <div class="news-title">${item.title}</div>
                    <div class="news-desc">${item.desc}</div>
                    <div class="news-time">${item.time}</div>
                `;
                
                container.appendChild(card);
            });
        }

        // Tự động chạy lần đầu tiên khi người dùng vừa truy cập vào trang web
        window.onload = loadAutomatedNews;
    </script>
</body>
</html>
