<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trung Tâm Game</title>
<style>
    body {
        margin: 0; padding: 20px 10px; background-color: #0b0c16; color: white;
        font-family: Arial, sans-serif; text-align: center; box-sizing: border-box;
    }
    h1 { margin-top: 20px; color: #00e676; font-size: 24px; }
    p { color: #888; font-size: 14px; margin-bottom: 30px; }
    
    .menu-container {
        display: flex; flex-direction: column; align-items: center; gap: 15px;
    }
    
    /* Thiết kế nút chọn game to rõ, dễ bấm trên điện thoại */
    .btn-select {
        width: 100%; max-width: 320px; padding: 18px; 
        background-color: #161730; border: 2px solid #333;
        border-radius: 12px; text-decoration: none; color: white; 
        display: block; box-sizing: border-box;
    }
    
    .btn-select h2 { margin: 0 0 5px 0; font-size: 18px; }
    .btn-select span { font-size: 12px; color: #aaa; }
    
    /* Đổi màu viền để phân biệt */
    .tank { border-color: #ff5722; }
    .tank h2 { color: #ff5722; }
    
    .tetris { border-color: #00e676; }
    .tetris h2 { color: #00e676; }
    
    .btn-back {
        display: inline-block; padding: 10px 24px; background-color: #ff5722;
        color: white; text-decoration: none; border-radius: 20px;
        font-weight: bold; font-size: 14px; margin-top: 40px; margin-bottom: 40px;
    }

    /* Khung chứa ảnh truyện vui */
    .funny-story {
        margin: 40px auto 20px auto;
        max-width: 450px;
        padding: 10px;
        background-color: #161730;
        border: 1px solid #333;
        border-radius: 12px;
    }
    .funny-story img {
        width: 100%;
        height: auto;
        border-radius: 8px;
        display: block;
    }
</style>
</head>
<body>

    <h1>🎮 DANH SÁCH TRÒ CHƠI 🎮</h1>
    <p>Chạm vào trò chơi bạn muốn mở</p>

    <div class="menu-container">
        <!-- Nút mở lại Game Xe Tăng cũ (Dẫn về trang chủ index.html nơi chứa game xe tăng gốc của bạn) -->
        <a href="index.html" class="btn-select tank">
            <h2>🚀 GAME XE TĂNG VŨ TRỤ</h2>
            <span>Chạm để quay về trang chủ chơi game xe tăng</span>
        </a>

        <!-- Nút mở Game Xếp Gạch mới tạo -->
        <a href="xepgach.html" class="btn-select tetris">
            <h2>🧱 GAME XẾP GẠCH CỔ ĐIỂN</h2>
            <span>Chơi game xếp gạch có âm thanh vui tai</span>
        </a>
    </div>

    <!-- Nút quay về trang chính -->
    <a href="index.html" class="btn-back">← Quay về trang chủ</a>

    <!-- KHU VỰC TRUYỆN VUI NẰM DƯỚI CÙNG -->
    <div class="funny-story">
        <p style="color: #ffaa00; font-weight: bold; margin-top: 0; margin-bottom: 10px;">Góc giải trí: Con gà khôn hơn cáo 🐔🦊</p>
        <img src="con-ga-va-con-cao.jpg" alt="Truyện vui Con gà khôn hơn cáo">
    </div>

</body>
</html>
