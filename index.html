<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MINNI WORLD - Trang Chủ</title>
<style>
    body {
        margin: 0; padding: 0; background-color: #0b0c10; color: #eee;
        font-family: 'Segoe UI', Arial, sans-serif;
    }
    /* Thanh menu màu xanh nguyên bản của bạn */
    nav {
        background-color: #1f2833;
        padding: 18px; /* Tăng độ dày thanh menu */
        text-align: center;
        box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    nav a {
        color: #66fcf1;
        text-decoration: none;
        margin: 0 20px; /* Tăng khoảng cách giữa các mục */
        font-weight: bold;
        font-size: 18px; /* Tăng cỡ chữ menu */
        transition: 0.3s;
    }
    nav a:hover {
        color: #45f3ff;
    }
    
    /* ĐÃ PHÓNG TO: Tăng kích thước khung chứa từ 1000px lên 1300px */
    .container { max-width: 1300px; margin: 30px auto; padding: 0 20px; box-sizing: border-box; text-align: center; }
    
    /* ĐÃ PHÓNG TO: Tăng kích thước Banner tối đa lên 1200px cho hoành tráng */
    .banner-container {
        position: relative; width: 100%; max-width: 1200px; margin: 20px auto; 
        border-radius: 15px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .banner-container img {
        width: 100%; height: auto; display: block; object-fit: cover;
    }
    .banner-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.5); display: flex; flex-direction: column;
        justify-content: center; align-items: center; color: white; padding: 20px;
    }
    /* ĐÃ PHÓNG TO: Tăng kích thước chữ tiêu đề chính lên 42px */
    .banner-overlay h1 { margin: 0 0 15px 0; font-size: 42px; letter-spacing: 2px; color: #45f3ff; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); }
    /* ĐÃ PHÓNG TO: Tăng kích thước chữ mô tả lên 18px */
    .banner-overlay p { margin: 0; font-size: 18px; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.6); }

    .welcome-text { margin: 50px 0; font-size: 18px; color: #8892b0; line-height: 1.8; }
</style>
</head>
<body>

    <!-- THANH MENU CŨ (Đã liên kết mục Xem phim sang file phim.html) -->
    <nav>
        <a href="#">Mini Game</a>
        <a href="#">Nhà đất</a>
        <a href="#">Tin tức</a>
        <a href="#">Công cụ</a>
        <a href="phim.html">Xem phim</a>
    </nav>

    <div class="container">
        
        <!-- KHUNG ẢNH BANNER TRANG CHỦ ĐÃ ĐƯỢC PHÓNG TO LỚN -->
        <div class="banner-container">
            <img src="https://unsplash.com" alt="Minni World Banner">
            
            <div class="banner-overlay">
                <h1>CHÀO MỪNG ĐẾN VỚI MINNI WORLD</h1>
                <p>Khám phá thế giới giải trí, tin tức việc làm & công cụ tiện ích miễn phí</p>
            </div>
        </div>

        <!-- Lời chào trang chủ to rõ hơn -->
        <div class="welcome-text">
            <p>Chào mừng bạn đã ghé thăm website chính thức của chúng tôi. <br>Hãy bấm vào các danh mục trên thanh menu để trải nghiệm dịch vụ.</p>
        </div>

    </div>

</body>
</html>
