<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Game - Đoán số</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game">

<h1>🎮 Đoán Số</h1>

<div class="info">
<p>🏆 High Score: <span id="highScore">0</span></p>
<p>⭐ Điểm: <span id="score">0</span></p>
<p>🎯 Lượt đoán: <span id="tries">0</span></p>
</div>

<p>Nhập số từ <b>1 đến 10</b></p>

<input id="guess" type="number" min="1" max="10">

<br><br>

<button onclick="startGame()">Đoán</button>
<button onclick="newGame()">Chơi lại</button>

<h2 id="text"></h2>

</div>

<script src="script.js"></script>

</body>
</html>
